name: Smoke quality gate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run smoke quality gate against production
        env:
          CAMPUSQ_API_URL: ${{ secrets.CAMPUSQ_API_URL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CAMPUSQ_QUALITY_GATE_KEY: ${{ secrets.QUALITY_GATE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python evals/quality_gate.py --tier smoke

      - name: Upload experiment results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-gate-results
          path: backend/evals/experiments/
          if-no-files-found: ignore

      - name: Notify Slack on smoke gate failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            payload=$(printf '{"text":"🚨 CampusQ smoke gate failed on %s\nRun: %s/%s/actions/runs/%s"}' \
              "${{ github.ref_name }}" \
              "${{ github.server_url }}" \
              "${{ github.repository }}" \
              "${{ github.run_id }}")
            curl -fsS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
          else
            echo "SLACK_WEBHOOK_URL not set — skipping Slack notification"
          fi
